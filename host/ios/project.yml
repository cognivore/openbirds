name: openbirds
options:
  bundleIdPrefix: de.memorici
  # iOS 26.0 minimum — Liquid Glass landed there, and that's the only
  # iOS version where this app makes sense visually. No backward-compat
  # ramps to maintain.
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true

targets:
  openbirds:
    type: application
    platform: iOS
    sources:
      - path: Sources
      # The CBridge module map (clang) sits beside Sources/. xcodegen
      # surfaces it in the project navigator; the actual import path is
      # set via SWIFT_INCLUDE_PATHS below.
      - path: CBridge
        buildPhase: none
      # Bundled assets (lucile.gif, etc.). xcodegen marks anything
      # under here as a copy-resources phase entry by default, so the
      # files land in openbirds.app/<filename> at runtime.
      - path: Resources
        buildPhase: resources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: openbirds
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.memorici.openbirds
        # C interop via clang module map, NOT a bridging header.
        # `SWIFT_OBJC_BRIDGING_HEADER` would force `-fobjc-link-runtime`
        # into the link; Xcode 26's `ld` then chokes on the
        # `-Xlinker -objc_abi_version -Xlinker 2` flag pattern. Module
        # maps don't trigger that linking path.
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/CBridge"
        # Static libs are produced per-SDK by Justfile recipes.
        # Simulator: `just build-koka-ios-sim`     → build/ios-sim/
        # Device:    `just build-koka-ios-device`  → build/ios-device/
        # xcodegen's [sdk=...] qualifier picks the right one per build.
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]": "$(SRCROOT)/../../build/ios-sim"
        "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]":        "$(SRCROOT)/../../build/ios-device"
        OTHER_LDFLAGS: "-lopenbirds"
        # Code signing for device. Simulator builds set
        # CODE_SIGNING_ALLOWED=NO via the Justfile to skip.
        DEVELOPMENT_TEAM:      22GNLKBRMV
        CODE_SIGN_STYLE:       Automatic
        CODE_SIGN_IDENTITY:    "Apple Development"
        # Per-SDK overrides: don't sign simulator builds, do sign device.
        "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": NO
        "CODE_SIGNING_ALLOWED[sdk=iphoneos*]":        YES
        TARGETED_DEVICE_FAMILY: "1"
        # Apple Silicon dev box → only arm64; never build x86_64 sim slice.
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: YES
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        # Two Xcode 26 link-driver workarounds that together get us a
        # working build for our project layout (Swift + C-interop +
        # static lib link). Both are local to this target — no
        # codebase changes required.
        #
        # 1. Disable the "debug dylib" feature: it inserts a
        #    `-Xlinker -alias _main -Xlinker
        #    ___debug_main_executable_dylib_entry_point` redirect and
        #    outputs an aux `.debug.dylib` that ld can't reconcile.
        ENABLE_DEBUG_DYLIB: NO
        # 2. Force LD = clang. Xcode 26 builds the link with clang-only
        #    flags (`-target …`, `-Xlinker …`, `-fobjc-link-runtime`)
        #    but defaults LD to `ld` (NOT a driver), so ld errors on
        #    flags it doesn't know. Pointing LD at clang restores the
        #    proper driver chain (clang strips/translates -Xlinker
        #    args before forwarding to ld).
        LD: $(DT_TOOLCHAIN_DIR)/usr/bin/clang
        LDPLUSPLUS: $(DT_TOOLCHAIN_DIR)/usr/bin/clang++

  # XCUITest target — drives the simulator through the actual user
  # gesture API (swipeUp, tap) to verify the scroll-and-close flow.
  # Run with `just test-ui-scroll`.
  #
  # Inherits the same Xcode-26 link-driver workarounds the main
  # target needs (LD = clang; ENABLE_DEBUG_DYLIB = NO). Without
  # these, ld errors on the `-Xlinker -objc_abi_version` flag
  # pattern that the test target's link line uses.
  openbirdsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    info:
      path: UITests/Info.plist
      properties:
        CFBundleDisplayName: openbirdsUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.memorici.openbirdsUITests
        TEST_TARGET_NAME: openbirds
        DEVELOPMENT_TEAM:      22GNLKBRMV
        "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": NO
        "CODE_SIGNING_ALLOWED[sdk=iphoneos*]":        YES
        TARGETED_DEVICE_FAMILY: "1"
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: YES
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        ENABLE_DEBUG_DYLIB: NO
        LD: $(DT_TOOLCHAIN_DIR)/usr/bin/clang
        LDPLUSPLUS: $(DT_TOOLCHAIN_DIR)/usr/bin/clang++
    dependencies:
      - target: openbirds

schemes:
  openbirds:
    build:
      targets:
        openbirds: all
    test:
      targets:
        - openbirdsUITests
    run:
      executable: openbirds
